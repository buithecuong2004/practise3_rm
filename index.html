<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vin Nexus Center</title>

    <!-- Bootstrap CSS (Grid & Utils) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/main.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Sidebar for Mobile -->
    <aside class="l-sidebar" id="sidebar">
        <div class="l-sidebar__header">
            <div class="l-sidebar__close" id="closeSidebar">
                <i class="fa-solid fa-xmark"></i>
            </div>
        </div>
        <nav class="l-sidebar__nav">
            <ul class="l-sidebar__list">
                <li class="l-sidebar__item"><a href="#" class="l-sidebar__link">Về Vin Nexus Center</a></li>
                <li class="l-sidebar__item"><a href="#" class="l-sidebar__link">Chương Trình Đào Tạo & Can Thiệp</a>
                </li>
                <li class="l-sidebar__item"><a href="#" class="l-sidebar__link">Tuyển Sinh</a></li>
                <li class="l-sidebar__item"><a href="#" class="l-sidebar__link">Liên Hệ</a></li>
            </ul>
        </nav>
    </aside>

    <!-- Overlay -->
    <div class="c-overlay" id="overlay"></div>

    <header class="l-header">
        <div class="container-fluid p-0">
            <div class="l-header__inner">
                <div class="l-header__logo-box">
                    <img src="./assets/images/logo.jpg" alt="Vin Nexus Center Logo" class="l-header__logo">
                </div>

                <!-- Hamburger Menu -->
                <div class="l-header__hamburger" id="openSidebar">
                    <i class="fa-solid fa-bars"></i>
                </div>

                <!-- Desktop Nav -->
                <nav class="l-header__nav d-none d-lg-flex">
                    <ul class="l-header__list">
                        <li class="l-header__item"><a href="#" class="l-header__link">Về Vin Nexus Center</a></li>
                        <li class="l-header__item"><a href="#" class="l-header__link">Chương Trình Đào Tạo & Can
                                Thiệp</a></li>
                        <li class="l-header__item"><a href="#" class="l-header__link">Tuyển Sinh</a></li>
                        <li class="l-header__item"><a href="#" class="l-header__link">Liên Hệ</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <main class="l-main">
        <section class="c-hero">
            <div class="container">
                <div class="row align-items-center">
                    <div class="col-lg-6 mb-5 mb-lg-0">
                        <div class="c-hero__content">
                            <div class="c-hero__header">
                                <h1 class="c-hero__title">Vin Nexus Center</h1>
                                <h2 class="c-hero__subtitle">Nâng niu và nuôi dưỡng từng giá trị riêng biệt</h2>
                            </div>
                            <button class="c-btn c-btn--accent c-btn--rounded">
                                ĐĂNG KÝ TƯ VẤN 1:1
                                <span class="c-btn__icon">
                                    <i class="fa-solid fa-chevron-right"></i>
                                </span>
                            </button>
                        </div>
                    </div>
                    <div class="col-lg-6">
                        <div class="c-hero__img-box">
                            <img src="./assets/images/bg.jpg" alt="Vin Nexus Center Background" class="c-hero__img">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Decoration -->
            <div class="c-hero__decoration-circle"></div>
        </section>
    </main>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="assets/js/scripts.js"></script>
</body>

</html>
